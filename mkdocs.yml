site_name: Murmur
site_description: A Python multi-agent orchestration runtime. Agents that move as one.
site_url: https://murmur-ai.github.io/murmur/
site_author: Murmur contributors
copyright: Copyright &copy; 2026 Murmur contributors

repo_url: https://github.com/murmur-ai/murmur
repo_name: murmur-ai/murmur
edit_uri: edit/main/docs/

docs_dir: docs
strict: true

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - toc.integrate
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

plugins:
  - search
  - glightbox
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src, packages/murmur-client/src]
          options:
            docstring_style: google
            docstring_section_style: spacy
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            line_length: 88
            merge_init_into_class: true
            show_signature_annotations: true
            signature_crossrefs: true
            filters:
              - "!^_"

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      base_path: [.]
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Home: index.md
  - Getting started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
  - Concepts:
      - Architecture: concepts/architecture.md
      - Runtime: concepts/runtime.md
      - Backends: concepts/backends.md
      - Agents: concepts/agents.md
      - Tools: concepts/tools.md
      - Coordination: concepts/coordination.md
      - Events & observability: concepts/events.md
      - Cost tracking: concepts/cost.md
      - MCP: concepts/mcp.md
      - Models & providers: concepts/models-and-providers.md
  - Guides:
      - Distributed deployments: guides/distributed.md
      - Embedded mode: guides/embedded.md
      - Migrating from PydanticAI: guides/migration-pydantic-ai.md
      - Migrating from FastStream: guides/migration-faststream.md
      - Migrating from raw asyncio: guides/migration-asyncio.md
  - API reference:
      - Overview: api/index.md
      - Agents & types: api/agent.md
      - Models: api/models.md
      - Providers: api/providers.md
      - Runtime: api/runtime.md
      - Groups: api/groups.md
      - Events: api/events.md
      - Middleware: api/middleware.md
      - Tools: api/tools.md
      - Context passers: api/context.md
      - Server: api/server.md
      - MCP server: api/mcp_server.md
      - Worker: api/worker.md
      - Runs: api/runs.md
      - Interop: api/interop.md
      - Protocols: api/protocols.md
      - Errors: api/errors.md
      - Client: api/client.md
  - Security: security.md
  - Changelog: changelog.md
  - Contributing: contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/murmur-ai/murmur
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/murmur-ai/
