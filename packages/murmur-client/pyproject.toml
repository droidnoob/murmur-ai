[project]
name = "murmur-client"
version = "0.1.0"
description = "Lightweight HTTP + in-process client for Murmur agent servers."
readme = "README.md"
authors = [
    { name = "droidnoob", email = "ak@needletailai.com" }
]
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">=3.11"
keywords = ["agents", "murmur", "client"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]

# Lean by design. ``murmur-client`` deliberately does not depend on
# ``murmur-runtime`` — the server-side install pulls PydanticAI + FastStream +
# structlog and a stack of broker drivers, none of which a thin HTTP
# caller needs. Wire types (``TaskSpec``, ``AgentResult``, ``RunStatus``,
# the ``MurmurError`` hierarchy) are defined locally in ``_wire.py``;
# round-trip identity comes from matching the JSON shape, not from
# sharing the Python class.
#
# Pinning notes:
#   The runtime exact-pins ``pydantic==X.Y.Z`` for reproducibility. If
#   this client also exact-pinned, Dependabot would bump them on
#   different days and the workspace would briefly fail to resolve.
#   Use a compatible range here: the workspace solve still picks up
#   the runtime's exact pin (so dev/CI use one version), and a
#   standalone ``pip install murmur-client`` accepts any recent 2.x.
dependencies = [
    "httpx>=0.27.0,<1.0",
    "pydantic>=2.10,<3.0",
]

[project.urls]
Homepage = "https://github.com/droidnoob/murmur-ai"
Issues = "https://github.com/droidnoob/murmur-ai/issues"

[build-system]
requires = ["uv_build>=0.10.9,<0.12.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "murmur_client"
module-root = "src"

# ``murmur-runtime`` lives in the same workspace — resolve it from there during
# ``uv sync``, not from PyPI. Mirrors the workspace declaration in the root
# ``pyproject.toml``.
[tool.uv.sources]
murmur-runtime = { workspace = true }
