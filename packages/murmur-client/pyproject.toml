[project]
name = "murmur-client"
version = "0.1.0"
description = "Lightweight HTTP + in-process client for Murmur agent servers."
readme = "README.md"
authors = [
    { name = "droidnoob", email = "ak@needletailai.com" }
]
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">=3.11"
keywords = ["agents", "murmur", "client"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]

# Lean by design. ``murmur-client`` deliberately does not depend on
# ``murmur-ai`` — the server-side install pulls PydanticAI + FastStream +
# structlog and a stack of broker drivers, none of which a thin HTTP
# caller needs. Wire types (``TaskSpec``, ``AgentResult``, ``RunStatus``,
# the ``MurmurError`` hierarchy) are defined locally in ``_wire.py``;
# round-trip identity comes from matching the JSON shape, not from
# sharing the Python class.
dependencies = [
    "httpx>=0.27.0,<1.0",
    "pydantic==2.13.3",
]

[project.urls]
Homepage = "https://github.com/droidnoob/murmur-ai"
Issues = "https://github.com/droidnoob/murmur-ai/issues"

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "murmur_client"
module-root = "src"

# ``murmur-ai`` lives in the same workspace — resolve it from there during
# ``uv sync``, not from PyPI. Mirrors the workspace declaration in the root
# ``pyproject.toml``.
[tool.uv.sources]
murmur-ai = { workspace = true }
