minimum_pre_commit_version: "4.6.0"

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^mkdocs\.yml$
      # mkdocs.yml uses ``!!python/name:`` tags for the emoji + mermaid
      # extensions, which the default safe loader rejects. ``--unsafe`` is
      # scoped to that one file.
      - id: check-yaml
        name: check-yaml (mkdocs)
        files: ^mkdocs\.yml$
        args: [--unsafe]
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  # ``ty`` runs on the whole project (per ``[tool.ty.src]`` in pyproject.toml),
  # not file-by-file — pass_filenames: false. Uses the dev-pinned version
  # (``ty==0.0.32``) via ``uv run`` so pre-commit and CI agree.
  - repo: local
    hooks:
      - id: ty
        name: ty check
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false
